name: Build Glyph Mini 2040

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init only required submodules
        run: |
          git submodule update --init lib/tinyusb
          git submodule update --init lib/huffman
          git submodule update --init tools/huffman
          git submodule update --init ports/raspberrypi/sdk
          git submodule update --init ports/raspberrypi/lib/Pico-PIO-USB
          git submodule update --init ports/raspberrypi/lib/PicoDVI
          git submodule update --init ports/raspberrypi/lib/cyw43-driver
          git submodule update --init ports/raspberrypi/lib/lwip

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi \
            libnewlib-arm-none-eabi build-essential cmake
          pip install huffman

      - name: Build firmware
        run: |
          cd ports/raspberrypi
          make BOARD=pcbcupid_glyph_mini_2040 -j$(nproc)

      - name: Upload .uf2
        uses: actions/upload-artifact@v4
        with:
          name: glyph-mini-2040-firmware
          path: ports/raspberrypi/build-pcbcupid_glyph_mini_2040/firmware.uf2
